name: ModelScan - ML Model Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  modelscan:
    name: Scan ML Model for Security Issues
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ModelScan and huggingface-hub
        run: pip install modelscan huggingface-hub

      - name: Download model files
        run: |
          python -c "
          from huggingface_hub import snapshot_download
          snapshot_download(
              repo_id='sentence-transformers/all-mpnet-base-v2',
              local_dir='./model',
              ignore_patterns=['*.onnx', '*.onnx_data', 'openvino*']
          )
          "

      - name: Scan model with ModelScan (console report)
        run: |
          echo "=== Scanning sentence-transformers/all-mpnet-base-v2 ==="
          modelscan scan -p ./model --show-skipped || true

      - name: Generate SARIF report for GHAS integration
        run: |
          modelscan scan -p ./model -r -o sarif -f modelscan-results.sarif || true

      - name: Generate JSON report
        run: |
          modelscan scan -p ./model -r -o json -f modelscan-results.json || true

      - name: Print scan summary
        if: always()
        run: |
          echo "============================================"
          echo "  MODEL SCAN SUMMARY"
          echo "============================================"
          echo "Model: sentence-transformers/all-mpnet-base-v2"
          echo "Source: https://huggingface.co/sentence-transformers/all-mpnet-base-v2"
          echo ""
          if [ -f modelscan-results.json ]; then
            echo "--- JSON Results ---"
            cat modelscan-results.json
          fi
          echo ""
          echo "============================================"

      - name: Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: modelscan-results.sarif
          category: modelscan
        continue-on-error: true

      - name: Upload scan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: modelscan-reports
          path: |
            modelscan-results.sarif
            modelscan-results.json
          retention-days: 90
