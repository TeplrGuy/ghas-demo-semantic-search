name: ModelScan - ML Model Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  modelscan:
    name: Scan ML Model for Security Issues
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ModelScan and huggingface-hub
        run: pip install modelscan huggingface-hub

      - name: Download model files
        run: |
          python -c "
          from huggingface_hub import snapshot_download
          snapshot_download(
              repo_id='sentence-transformers/all-mpnet-base-v2',
              local_dir='./model',
              ignore_patterns=['*.onnx', '*.onnx_data', 'openvino*']
          )
          "

      - name: Scan model with ModelScan
        run: |
          echo "=== Scanning sentence-transformers/all-mpnet-base-v2 ==="
          modelscan scan -p ./model || true

      - name: Detailed scan report
        run: |
          echo "=== Detailed model scan report ==="
          modelscan scan -p ./model --show-skipped || true
